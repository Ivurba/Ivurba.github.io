<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>
</head>
<body>
  <div class="dashboard-container">
    <h2>Dashboard - Buscar Recomendaciones por Autor</h2>

    <div class="busqueda-dashboard">
      <label for="txtBuscarDashboard">Buscar autor:</label>
      <input type="text" id="txtBuscarDashboard" placeholder="Escribe el nombre del autor...">
      <button onclick="BuscarAutorDashboard()">Buscar</button>
    </div>

    <h3>Resultados:</h3>
    <ul id="dashboardList"></ul>
  </div>
</body>
</html>
